version: "3.8"

networks:
  stokk_net:
    driver: bridge

services:

  postgres:
    image: postgres:16-alpine
    container_name: stokk-postgres
    restart: unless-stopped
    networks: [stokk_net]
    environment:
      - POSTGRES_USER=foodtracker
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-foodtracker}
      - POSTGRES_DB=foodtracker
    volumes:
      - /volume1/TorrentBox/docker/stokk/postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foodtracker"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  backend:
    image: ghcr.io/axelterrier/stokk-backend:latest
    container_name: stokk-backend
    restart: unless-stopped
    networks: [stokk_net]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://foodtracker:${POSTGRES_PASSWORD:-foodtracker}@postgres:5432/foodtracker
      - MONGO_URL=${MONGO_URL:-mongodb://192.168.1.100:27017}
      - MONGO_DB=${MONGO_DB:-openfoodfacts}
      - MONGO_COLLECTION=${MONGO_COLLECTION:-products}
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required}
      - CORS_ORIGINS=${CORS_ORIGINS:-https://localhost:9300}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  frontend:
    image: ghcr.io/axelterrier/stokk-frontend:latest
    container_name: stokk-frontend
    restart: unless-stopped
    networks: [stokk_net]
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "9300:443"
    volumes:
      # nginx.conf à copier depuis le repo : frontend/nginx.conf
      - /volume1/TorrentBox/docker/stokk/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Certificat SSL persisté entre les redémarrages
      - /volume1/TorrentBox/docker/stokk/ssl:/etc/nginx/ssl
